<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA 簡單計算機</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --calc-bg: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --accent: #2563eb;
            --btn-bg: #e5e7eb;
            --btn-hover: #d1d5db;
            --op-bg: #3b82f6;
            --op-hover: #2563eb;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --calc-bg: #1f2937;
                --text-primary: #f9fafb;
                --text-secondary: #9ca3af;
                --accent: #3b82f6;
                --btn-bg: #374151;
                --btn-hover: #4b5563;
                --op-bg: #2563eb;
                --op-hover: #1d4ed8;
                --shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            transition: background-color 0.3s;
            overflow: hidden; /* 防止滾動 */
        }

        /* 核心佈局 */
        .calculator {
            background-color: var(--calc-bg);
            width: 100%;
            max-width: 380px;
            padding: 24px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            user-select: none;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 顯示螢幕 */
        .display {
            margin-bottom: 20px;
            text-align: right;
            padding: 20px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            word-wrap: break-word;
            overflow: hidden;
        }

        .prev-operand {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            min-height: 1.2em;
        }

        .curr-operand {
            font-size: 2.5rem;
            color: var(--text-primary);
            font-weight: bold;
            line-height: 1;
        }

        /* 按鈕網格 */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            outline: none;
            padding: 18px;
            font-size: 1.4rem;
            border-radius: 14px;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: var(--text-primary);
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 500;
        }

        button:active {
            transform: scale(0.92);
            filter: brightness(0.9);
        }

        @media (hover: hover) {
            button:hover {
                background-color: var(--btn-hover);
            }
            button.operator:hover {
                background-color: var(--op-hover);
            }
        }

        button.operator {
            background-color: var(--op-bg);
            color: white;
        }

        button.span-two {
            grid-column: span 2;
        }

        button.clear {
            color: #ef4444;
        }

        /* --- 橫向模式 (Landscape) 優化 --- */
        @media (orientation: landscape) and (max-height: 500px) {
            .calculator {
                flex-direction: row;
                max-width: 95vw;
                height: 90vh;
                gap: 20px;
                padding: 16px;
            }

            .display {
                flex: 1;
                margin-bottom: 0;
                height: 100%;
                justify-content: center;
            }

            .buttons {
                flex: 1.5;
                gap: 8px;
            }

            button {
                padding: 10px;
                font-size: 1.1rem;
                border-radius: 10px;
            }

            .curr-operand {
                font-size: 2rem;
            }
            
            .prev-operand {
                font-size: 0.9rem;
            }
        }

        /* --- 大螢幕 (Desktop) 優化 --- */
        @media (min-width: 1024px) {
            .calculator {
                max-width: 420px;
            }
            button {
                padding: 22px;
            }
        }

        /* 安裝提示橫幅 */
        #install-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            display: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            font-weight: bold;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div class="prev-operand" id="prev-display"></div>
            <div class="curr-operand" id="curr-display">0</div>
        </div>
        <div class="buttons">
            <button class="clear span-two" onclick="clearDisplay()">AC</button>
            <button onclick="deleteNumber()">DEL</button>
            <button class="operator" onclick="chooseOperator('÷')">÷</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="chooseOperator('×')">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="chooseOperator('-')">-</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="chooseOperator('+')">+</button>
            
            <button onclick="appendNumber('.')">.</button>
            <button onclick="appendNumber('0')">0</button>
            <button class="operator span-two" onclick="compute()">=</button>
        </div>
    </div>

    <div id="install-banner">安裝到桌面</div>

    <script>
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;
        let shouldResetDisplay = false;

        const currDisplayElement = document.getElementById('curr-display');
        const prevDisplayElement = document.getElementById('prev-display');

        function updateDisplay() {
            // 處理數字過長顯示
            let displayValue = currentOperand;
            if (displayValue.length > 10) {
                displayValue = parseFloat(displayValue).toPrecision(8);
            }
            
            currDisplayElement.innerText = displayValue;
            
            if (operation != null) {
                prevDisplayElement.innerText = `${previousOperand} ${operation}`;
            } else {
                prevDisplayElement.innerText = '';
            }
        }

        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentOperand = '';
                shouldResetDisplay = false;
            }
            
            if (number === '.' && currentOperand.includes('.')) return;
            if (currentOperand === '0' && number !== '.') {
                currentOperand = number.toString();
            } else if (currentOperand === '錯誤') {
                currentOperand = number.toString();
            } else {
                currentOperand = currentOperand.toString() + number.toString();
            }
            updateDisplay();
        }

        function chooseOperator(op) {
            if (currentOperand === '錯誤') return;
            if (currentOperand === '') return;
            
            if (previousOperand !== '') {
                compute();
            }
            
            operation = op;
            previousOperand = currentOperand;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearDisplay() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteNumber() {
            if (currentOperand === '錯誤' || shouldResetDisplay) {
                currentOperand = '0';
                updateDisplay();
                return;
            }
            if (currentOperand === '0') return;
            
            currentOperand = currentOperand.toString().slice(0, -1);
            if (currentOperand === '') currentOperand = '0';
            updateDisplay();
        }

        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '×':
                    computation = prev * current;
                    break;
                case '÷':
                    if (current === 0) {
                        currentOperand = "錯誤";
                        operation = undefined;
                        previousOperand = '';
                        updateDisplay();
                        return;
                    }
                    computation = prev / current;
                    break;
                default:
                    return;
            }

            // 修正浮點數精度問題 (例如 0.1 + 0.2)
            currentOperand = parseFloat(computation.toFixed(10)).toString();
            operation = undefined;
            previousOperand = '';
            shouldResetDisplay = true;
            updateDisplay();
        }

        // 鍵盤支援
        window.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '=' || e.key === 'Enter') compute();
            if (e.key === 'Backspace') deleteNumber();
            if (e.key === 'Escape') clearDisplay();
            if (e.key === '+') chooseOperator('+');
            if (e.key === '-') chooseOperator('-');
            if (e.key === '*') chooseOperator('×');
            if (e.key === '/') {
                e.preventDefault();
                chooseOperator('÷');
            }
        });

        // 註冊 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .catch(err => console.log('SW registration failed:', err));
            });
        }

        // PWA 安裝邏輯
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';
        });

        installBanner.addEventListener('click', () => {
            installBanner.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
            });
        });
    </script>
</body>
</html>
